name: Publish to NuGet

on:
  push:
    tags: [ 'v*' ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Pack all packages
      run: |
        for csproj in src/Cloudflare.Net*/Cloudflare.Net*.csproj; do
          dotnet pack "$csproj" --no-build --configuration Release --output ./nupkg -p:Version=${{ steps.version.outputs.VERSION }} -p:IncludeSymbols=false
        done
        rm -f ./nupkg/*.snupkg

    - name: NuGet login
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: SunnyDotNet

    - name: Push to NuGet.org
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Push to GitHub Packages
      if: ${{ !cancelled() }}
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/Sunny-DotNet/index.json --skip-duplicate
